<html lang="en">

<head>

<link rel="manifest" href="/manifest.json">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4844045911009721"
crossorigin="anonymous"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#020c12;
color:white;
}

/* referral banner */

.referral-banner{
background:#0f172a;
padding:18px;
text-align:center;
border-bottom:1px solid #1f2937;
}

.referral-btn{
background:#00d09c;
border:none;
padding:12px 22px;
border-radius:6px;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

/* popup */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#0f172a;
padding:25px;
border-radius:10px;
text-align:center;
width:90%;
max-width:350px;
border:1px solid #1f2937;
}

.popup-box h2{
margin-top:0;
}

.close-btn{
margin-top:15px;
background:#1f2937;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- Groww Banner -->

<div class="referral-banner">

<h3>Start Real Trading 🚀</h3>

<p style="color:#9ca3af;">
You tested predictions here. Now trade real stocks using Groww.
</p>

<a href="https://app.groww.in/v3cO/85xwgva5" target="_blank">
<button class="referral-btn">
Open Free Demat Account on Groww
</button>
</a>

</div>

<div style="text-align:center;margin-top:15px;">
<button id="installBtn" class="referral-btn" style="display:none;">
Download App 📱
</button>
</div>

<!-- React App -->

<div id="root"></div>

<!-- Groww Popup -->

<div class="popup-overlay" id="growwPopup">

<div class="popup-box">

<h2>Start Real Trading 📈</h2>

<p style="color:#9ca3af;">
Open your free Demat account on Groww and start investing today.
</p>

<a href="https://app.groww.in/v3cO/85xwgva5" target="_blank">
<button class="referral-btn">
Open Groww Account
</button>
</a>

<br/>

<button class="close-btn" onclick="closePopup()">Maybe Later</button>

</div>

</div>

<script>
function closePopup(){
document.getElementById("growwPopup").style.display="none";
}
</script>

<script type="module" src="/src/main.tsx"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

<script>

let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;

  installBtn.style.display = "inline-block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === "accepted") {
    console.log("App installed");
  }

  deferredPrompt = null;
});

</script>

</body>
